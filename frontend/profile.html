<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - AI Smart Assistant</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="profile-page">
    <div class="profile-container">
        <div class="profile-card">
            <h1>Your Profile</h1>
            <p class="profile-subtitle">Update your display name, avatar, and timezone preferences.</p>

            <img id="avatarPreview" class="profile-avatar-preview" src="" alt="Avatar preview" hidden>

            <form id="profileForm" class="profile-form">
                <div>
                    <label for="username">Display Name</label>
                    <input id="username" name="username" type="text" required minlength="3" placeholder="Your name">
                </div>

                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" readonly>
                </div>

                <div>
                    <label for="avatar">Avatar URL</label>
                    <input id="avatar" name="avatar" type="url" placeholder="https://example.com/avatar.png">
                </div>

                <div>
                    <label for="timezone">Timezone</label>
                    <select id="timezone" name="timezone"></select>
                </div>

                <div class="profile-actions">
                    <button type="submit" class="btn-submit">Save Profile</button>
                    <a class="profile-back" href="dashboard.html">Back to Dashboard</a>
                </div>
            </form>

            <div class="sessions-card">
                <h2>Device Sessions</h2>
                <p class="profile-subtitle">Manage where your account is logged in.</p>
                <button id="revokeAllSessionsBtn" type="button" class="btn-submit secondary-btn">Logout All Devices</button>
                <div id="sessionList" class="session-list"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/utils.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
